<!DOCTYPE html>
<html>
<head>
    <title>Student Project Task Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Student Project Task Management System</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Create Task</h2>
        <input type="text" id="taskInput" placeholder="Enter Task">
        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="card">
        <h2>Task List</h2>
        <ul id="taskList"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
